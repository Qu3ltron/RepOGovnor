# Copy to project.config.toml and edit before install-to-workspace.sh
# Paths may use {{AUTO_REPO_ROOT}} to substitute git rev-parse --show-toplevel at install time.

[project]
# `repo_name` is used to auto-derive `{{REPO_SLUG}}` for plan templates:
# lowercased, non-alphanumeric characters replaced with hyphens.
# `{{REPO_SLUG}}` is available as a substitution variable in all templates.
repo_name = "my-project"
repo_root = "{{AUTO_REPO_ROOT}}"
scratch_root = "/tmp/my-project-gap-closure"
constitution_path = "CONSTITUTION.md"
vision_path = "VISION.md"
agents_path = "AGENTS.md"
design_docs_path = "docs/design"

[task_registry]
# Canonical plugin-owned executor. Hard cutover forbids project-native task_registry executors.
cli_command = ".codex/scripts/task-registry"
registry_path = "docs/task-registry.toml"
plans_path = "docs/plans"
archive_dir = "docs/task-registry/archive"

[mutation_gate]
# Hook command; reads hook JSON from stdin and emits native Codex, AGY, or Cursor JSON.
verify_hook_command = ".codex/scripts/task-registry verify-mutation-hook"
hook_script_path = "tools/agent-governance/pre-tool-use-gap-closure.sh"

[environments]
render_codex = true
render_antigravity = true
render_cursor = true
render_claude_code = true
install_global_antigravity_plugin = false
minimum_agy_version = "1.0.3"

[validation]
# Suggested gates for contract Validation Plan sections (project-specific; not enforced by plugin)
focused = [".codex/scripts/task-registry source-limit check", "cargo test"]
full = [".codex/scripts/task-registry validate", "cargo test", "cargo fmt --check"]

# Optional — omit or leave verify_command empty to skip commit-governance section in AGENTS.md
[commit_governance]
plan_id_footer_required = false
verify_command = ""
implementation_path_globs = []

[authority]
# Ordered list for conflict resolution (highest first). Project defines meaning of each doc.
order = ["CONSTITUTION.md", "VISION.md", "docs/design/*"]
