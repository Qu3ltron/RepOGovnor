name: Agent Governance

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, resolved 2026-06-01
      - name: Validate task registry and source-file limits
        run: .codex/scripts/task-registry validate
      - name: Verify governance install posture
        run: plugins/agent-governance/scripts/status.sh --strict
