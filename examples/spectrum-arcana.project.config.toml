# Spectrum Arcana — reference config for agent-governance plugin (docs only)
#
# This file documents how the portable plugin maps onto this repo.
# Do NOT run install-to-workspace.sh against the live Tarot tree unless you
# intend to refresh infrastructure files. Prefer --merge for existing repos.
#
#   plugins/agent-governance/scripts/install-to-workspace.sh \
#     --config plugins/agent-governance/examples/spectrum-arcana.project.config.toml \
#     --merge

[project]
repo_name = "spectrum-arcana"
repo_root = "{{AUTO_REPO_ROOT}}"
scratch_root = "/home/hasnamuss/reclaimed/work/tmp/spectrum-arcana-gap-closure"
constitution_path = "CONSTITUTION.md"
vision_path = "VISION.md"
design_docs_path = "docs/design"

[task_registry]
cli_command = ".codex/scripts/task-registry"
registry_path = "docs/task-registry.toml"
plans_path = "docs/plans"
archive_dir = "docs/task-registry/archive"

[mutation_gate]
verify_hook_command = ".codex/scripts/task-registry verify-mutation-hook"
hook_script_path = "tools/agent-governance/pre-tool-use-gap-closure.sh"

[validation]
focused = [".codex/scripts/task-registry source-limit check", "cargo test"]
full = [
  ".codex/scripts/task-registry validate",
  "cargo test",
  "cargo run --bin enforce-architecture",
  "cargo run --bin verify-artifacts",
]

[commit_governance]
plan_id_footer_required = true
verify_command = "cargo run --bin enforce-plan-commits -- verify-commits"
implementation_path_globs = ["src/", "crates/", "apps/", "api/", "ui/", "tests/"]

[authority]
order = [
  "spectrum_arcana_booklet_first_draft.md",
  "spectrum_arcana_booklet_visual_flow_v_01.md",
  "CONSTITUTION.md",
  "VISION.md",
  "docs/design/*",
]
